name: UiPath CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Pack UiPath Project
        uses: UiPath/pack@v2
        with:
          project_path: .
          output_path: output
