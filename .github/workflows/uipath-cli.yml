name: UiPath CI Pipeline

on:
 push:
  branches: [ main ]

jobs:
 build:
  runs-on: windows-latest
 
  steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Pack UiPath Project
    uses: UiPath/pack@v2
    with:
      projectPath: .

  - name: Upload Package Artifact
    uses: actions/upload-artifact@v4
    with:
      name: uipath-package
      path: '*.nupkg'
