name: UiPath CE CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  backup:
    runs-on: windows-latest

    steps:
      
      - name: Checkout Repository
        uses: actions/checkout@v4

      
      - name: Validate Project Files
        shell: pwsh
        run: |
          if (!(Test-Path "./project.json")) {
            Write-Error "project.json not found. CI cannot continue."
          } else {
            Write-Host "Project structure looks good."
          }

     
      - name: Prepare Artifact Folder
        shell: pwsh
        run: |
          $artifactPath = "$PWD/UiPathProjectBackup"
          if (Test-Path $artifactPath) { Remove-Item -Recurse -Force $artifactPath }
          New-Item -ItemType Directory -Path $artifactPath

          # Copy all files except the artifact folder itself
          Get-ChildItem -Path $PWD | Where-Object { $_.Name -ne 'UiPathProjectBackup' } | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination $artifactPath -Recurse -Force
          }

          Write-Host "Project copied to artifact folder: $artifactPath"

     
      - name: Upload UiPath Project Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UiPath-Project
          path: UiPathProjectBackup
