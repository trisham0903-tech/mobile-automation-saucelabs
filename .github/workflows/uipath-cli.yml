name: UiPath CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload UiPath project as artifact
        uses: actions/upload-artifact@v4
        with:
          name: uipath-project
          path: .
