name: UiPath CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup UiPath CLI
        uses: Mikael-RnD/setup-uipath@v2

      - name: Pack UiPath project
        shell: pwsh
        run: |
          uipcli pack .
